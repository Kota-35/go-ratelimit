services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

  api1:
    build: .
    environment:
      SERVER_NAME: api1
      CAPACITY: ${CAPACITY:-10}
      REFILL_RATE: ${REFILL_RATE:-1}

  api2:
    build: .
    environment:
      SERVER_NAME: api2
      CAPACITY: ${CAPACITY:-10}
      REFILL_RATE: ${REFILL_RATE:-1}
