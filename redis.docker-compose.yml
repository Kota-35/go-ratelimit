services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

  api1:
    build: .
    environment:
      SERVER_NAME: api1
      REDIS_ADDR: redis:6379
      ALGORITHM: sliding_window_counter
    depends_on:
      - redis

  api2:
    build: .
    environment:
      SERVER_NAME: api2
      REDIS_ADDR: redis:6379
      ALGORITHM: sliding_window_counter
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
